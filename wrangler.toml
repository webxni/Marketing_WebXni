name = "marketing-webxni"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 2 * * *",    # Fetch real URLs from Upload-Post history — daily 2AM
  "0 * * * *",    # Recurring GBP offers/events — top of every hour
  "*/1 * * * *",  # Exact-time posting — polls every minute for due posts
  "0 9 * * *",    # Platform health check + agency stale check — daily 9AM
  "0 20 * * FRI", # Agency weekend sequence begins — Friday 8PM UTC
  "0 8 * * SAT",  # Agency Saturday morning — research + strategy
  "0 16 * * SAT", # Agency Saturday afternoon — blog drafts + editorial
  "0 7 * * SUN",  # Agency Sunday morning — social copy + editorial
  "0 16 * * SUN", # Agency Sunday afternoon — orchestrator wrap-up
  "0 16,19,22 * * MON-FRI", # Editorial review sweep — every 3h during business hours (9am/12pm/3pm PT)
]

[[d1_databases]]
binding = "DB"
database_name = "webxni_db"
database_id = "c2240507-7d37-43c8-94bd-fb098aeedfc8"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "webxni-media"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "webxni-images"

[[kv_namespaces]]
binding = "KV_BINDING"
id = "fd77c3e7e1c247758cc440561c78a302"

[[routes]]
pattern = "marketing.webxni.com"
custom_domain = true

# Self service binding — lets the Worker call itself without going through
# the public network (avoids 522 errors on custom-domain self-calls).
[[services]]
binding = "SELF"
service = "marketing-webxni"

[assets]
directory = "./frontend/build"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[vars]
# Agency scheduler — set to "true" to let crons auto-enqueue agents
AGENCY_SCHEDULER_ENABLED = "true"

# Public base URL for the MEDIA R2 bucket (set after enabling public access in Cloudflare R2 dashboard)
# Format: https://pub-<hash>.r2.dev   OR your custom domain e.g. https://media.webxni.com
R2_MEDIA_PUBLIC_URL = ""

# Discord — non-secret config (channel/app IDs are not sensitive)
# Get Application ID from: discord.com/developers/applications → your app → General Information
DISCORD_APPLICATION_ID = "1468394932837552248"
# Channel to send notifications to (from the channel URL)
DISCORD_CHANNEL_ID = "1242943323828916234"
# Owner's personal Discord user ID — receives DMs for critical alerts
# NOTE: This is YOUR user ID, not the bot's. To find yours: Discord → Settings → Advanced
# → enable Developer Mode → right-click your username → Copy User ID
DISCORD_OWNER_ID = "1242861091214721139"

# Secrets (set via: wrangler secret put <NAME>)
# UPLOAD_POST_API_KEY
# OPENAI_API_KEY
# DISCORD_BOT_TOKEN       — Bot token from Developer Portal → Bot → Reset Token
# DISCORD_PUBLIC_KEY      — Ed25519 Public Key from Developer Portal → General Information
