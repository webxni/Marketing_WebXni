name = "marketing-webxni"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 7 * * SUN",  # Weekly generation — Sunday 7AM
  "0 2 * * *",    # Fetch real URLs from Upload-Post history — daily 2AM
  "0 * * * *",    # Recurring GBP offers/events — top of every hour
  "*/1 * * * *",  # Exact-time posting — polls every minute for due posts
]

[[d1_databases]]
binding = "DB"
database_name = "webxni_db"
database_id = "c2240507-7d37-43c8-94bd-fb098aeedfc8"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "webxni-media"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "webxni-images"

[[kv_namespaces]]
binding = "KV_BINDING"
id = "fd77c3e7e1c247758cc440561c78a302"

[[routes]]
pattern = "marketing.webxni.com"
custom_domain = true

# Self service binding — lets the Worker call itself without going through
# the public network (avoids 522 errors on custom-domain self-calls).
[[services]]
binding = "SELF"
service = "marketing-webxni"

[assets]
directory = "./frontend/build"
binding = "ASSETS"
run_worker_first = ["/api/*", "/internal/*", "/media/*"]
not_found_handling = "single-page-application"

[vars]
# Public base URL for the MEDIA R2 bucket (set after enabling public access in Cloudflare R2 dashboard)
# Format: https://pub-<hash>.r2.dev   OR your custom domain e.g. https://media.webxni.com
R2_MEDIA_PUBLIC_URL = ""

# Secrets (set via: wrangler secret put UPLOAD_POST_API_KEY)
# UPLOAD_POST_API_KEY
# OPENAI_API_KEY
