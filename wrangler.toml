name = "marketing-webxni"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 7 * * 0",    # Weekly generation — Sunday 7AM
  "0 2 * * *",    # Fetch real URLs from Upload-Post history — daily 2AM
  "0 */6 * * *",  # Posting check — every 6 hours
]

[[d1_databases]]
binding = "DB"
database_name = "webxni-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "webxni-media"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "webxni-images"

[[kv_namespaces]]
binding = "SESSION"
id = "REPLACE_WITH_YOUR_SESSION_KV_ID"

[[services]]
binding = "LOADER"
service = "marketing-webxni-loader"

[assets]
directory = "./frontend/build"
binding = "ASSETS"
# Worker handles /api/* before static assets are checked
run_worker_first = ["/api/*"]

[vars]
# Public base URL for the MEDIA R2 bucket (set after enabling public access in Cloudflare R2 dashboard)
# Format: https://pub-<hash>.r2.dev   OR your custom domain e.g. https://media.webxni.com
R2_MEDIA_PUBLIC_URL = ""

# Secrets (set via: wrangler secret put UPLOAD_POST_API_KEY)
# UPLOAD_POST_API_KEY
# OPENAI_API_KEY
